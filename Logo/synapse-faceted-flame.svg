<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <!-- Primary gradient — dark base to blood orange to bright tip -->
    <linearGradient id="flameMain" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#8B2500"/>
      <stop offset="30%" stop-color="#c23400"/>
      <stop offset="60%" stop-color="#d63a00"/>
      <stop offset="85%" stop-color="#e85420"/>
      <stop offset="100%" stop-color="#f06830"/>
    </linearGradient>
    <!-- Left facet — slightly darker for depth -->
    <linearGradient id="facetLeft" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#a62e00"/>
      <stop offset="100%" stop-color="#c23400"/>
    </linearGradient>
    <!-- Right facet — slightly lighter for dimension -->
    <linearGradient id="facetRight" x1="1" y1="0.3" x2="0" y2="0.7">
      <stop offset="0%" stop-color="#e04a10"/>
      <stop offset="100%" stop-color="#d63a00"/>
    </linearGradient>
    <!-- Center highlight facet -->
    <linearGradient id="facetCenter" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#c23400"/>
      <stop offset="40%" stop-color="#d63a00"/>
      <stop offset="100%" stop-color="#ef6025"/>
    </linearGradient>
    <!-- Inner core glow -->
    <linearGradient id="innerGlow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#d63a00"/>
      <stop offset="100%" stop-color="#ff8044"/>
    </linearGradient>
  </defs>

  <!-- 
    FACETED FLAME — Synapse V2
    Geometric crystal flame built from angular facets.
    Centered on viewBox for clean embedding.
  -->

  <g transform="translate(100, 140)">
    <!-- === LEFT OUTER FACET === -->
    <polygon points="0,-130 -52,20 -30,60 0,-40" fill="url(#facetLeft)"/>
    
    <!-- === RIGHT OUTER FACET === -->
    <polygon points="0,-130 52,20 30,60 0,-40" fill="url(#facetRight)"/>
    
    <!-- === BOTTOM LEFT FACET === -->
    <polygon points="-52,20 -30,60 -48,100 -60,60" fill="#9a2800"/>
    
    <!-- === BOTTOM RIGHT FACET === -->
    <polygon points="52,20 30,60 48,100 60,60" fill="#b83200"/>
    
    <!-- === BOTTOM CENTER === -->
    <polygon points="-30,60 30,60 48,100 0,130 -48,100" fill="#8B2500"/>
    
    <!-- === CENTER FRONT FACET (primary face) === -->
    <polygon points="0,-130 -30,60 0,20 30,60" fill="url(#facetCenter)"/>
    
    <!-- === INNER HIGHLIGHT — bright core === -->
    <polygon points="0,-80 -16,30 0,10 16,30" fill="url(#innerGlow)" opacity="0.5"/>
    
    <!-- === TIP HIGHLIGHT — bright point at apex === -->
    <polygon points="0,-130 -8,-90 0,-95 8,-90" fill="#ff8044" opacity="0.6"/>
  </g>
</svg>